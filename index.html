<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز معرفة الإنقاذ البحري الجوي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#040d1a;--surface:#07142a;--card:#0a1c38;--border:#1a3056;--border2:#0f2040;
    --gold:#c8a050;--gold2:#e8c070;--text:#c8d8ee;--muted:#5a7a9a;
    --user:#112a52;--bot:#060f20;--danger:#c05858;--success:#3a9060;--input:#060f20;
    --scan:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(10,40,80,.15) 2px,rgba(10,40,80,.15) 4px);
  }
  html,body{height:100%;background:var(--bg);font-family:'Cairo',sans-serif;color:var(--text);overflow:hidden}
  #root{height:100%;display:flex;flex-direction:column;max-width:960px;margin:0 auto}
  .header{background:linear-gradient(135deg,#040d1a 0%,#071428 60%,#0a1c38 100%);border-bottom:1px solid var(--gold);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden}
  .header::after{content:'';position:absolute;inset:0;background:var(--scan);pointer-events:none;opacity:.5}
  .header-logo{display:flex;align-items:center;gap:12px}
  .anchor{width:42px;height:42px;background:radial-gradient(circle,#c8a05040,#c8a05010);border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 0 16px #c8a05030}
  .header-title{font-size:14px;font-weight:700;color:var(--gold2);line-height:1.3}
  .header-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
  .nav{display:flex;gap:8px;align-items:center}
  .nav-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;white-space:nowrap}
  .nav-btn:hover,.nav-btn.active{border-color:var(--gold);color:var(--gold);background:#c8a05015}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px #3a9060;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
  .main{flex:1;overflow:hidden;display:flex;flex-direction:column}
  .chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
  .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .msg-row{display:flex;gap:10px;align-items:flex-start;animation:fadeIn .3s ease}
  .msg-row.user{flex-direction:row-reverse}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid var(--border)}
  .avatar.bot{background:radial-gradient(#c8a05020,#c8a05005);border-color:#c8a05040}
  .avatar.user{background:radial-gradient(#1a3a6a,#112050);border-color:#2a4a8a}
  .bubble{max-width:75%;padding:12px 16px;font-size:13.5px;line-height:1.7;white-space:pre-wrap;word-break:break-word;border-radius:4px 18px 18px 18px;border:1px solid var(--border2);background:var(--bot);position:relative}
  .bubble.user{border-radius:18px 4px 18px 18px;background:var(--user);border-color:#1e3a6a;text-align:right}
  .bubble.bot::before{content:'';position:absolute;right:-1px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),transparent);border-radius:1px}
  .typing{display:flex;align-items:center;gap:6px;padding:14px 20px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);opacity:.8;animation:dotBounce 1.4s infinite ease-in-out}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes dotBounce{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}
  .input-area{padding:14px 18px;background:linear-gradient(0deg,var(--surface),var(--surface) 90%,transparent);border-top:1px solid var(--border2);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
  .chat-input{flex:1;background:var(--input);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;outline:none;resize:none;min-height:46px;max-height:120px;line-height:1.5;transition:border-color .2s}
  .chat-input:focus{border-color:#c8a05080}
  .chat-input::placeholder{color:var(--muted)}
  .send-btn{width:46px;height:46px;flex-shrink:0;background:linear-gradient(135deg,var(--gold),#a07830);border:none;border-radius:12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:opacity .2s,transform .1s;color:#fff}
  .send-btn:hover:not(:disabled){transform:scale(1.05)}
  .send-btn:disabled{opacity:.4;cursor:not-allowed}
  .admin-wrap{flex:1;overflow-y:auto;padding:18px}
  .admin-wrap::-webkit-scrollbar{width:4px}
  .admin-wrap::-webkit-scrollbar-thumb{background:var(--border)}
  .admin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;direction:rtl}
  .admin-title{font-size:16px;font-weight:700;color:var(--gold2)}
  .admin-count{font-size:12px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
  .action-row{display:flex;gap:8px;flex-wrap:wrap}
  .btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'Cairo',sans-serif;transition:all .2s;white-space:nowrap}
  .btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold2)}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
  .btn-danger{background:#c0585820;border:1px solid #c0585850;color:var(--danger)}.btn-danger:hover{background:var(--danger);color:#fff}
  .btn-sm{padding:5px 10px;font-size:12px}
  .cats{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;direction:rtl}
  .cat-btn{padding:4px 12px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s}
  .cat-btn.active{border-color:var(--gold);color:var(--gold);background:#c8a05015}
  .card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:10px;transition:border-color .2s}
  .card:hover{border-color:var(--border)}.card.form-card{border-color:#c8a05040;margin-bottom:16px}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;direction:rtl;gap:10px}
  .card-badge{display:inline-block;padding:2px 10px;border-radius:10px;background:#c8a05018;border:1px solid #c8a05030;color:var(--gold);font-size:11px;margin-bottom:8px}
  .card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;direction:rtl}
  .card-content{font-size:12px;color:var(--muted);line-height:1.6;direction:rtl}
  .card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
  .tag{padding:2px 8px;border-radius:4px;background:var(--border2);color:var(--muted);font-size:11px}
  .card-actions{display:flex;gap:6px;flex-shrink:0}
  .form-group{margin-bottom:12px;direction:rtl}
  .form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .form-input{width:100%;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s;direction:rtl}
  .form-input:focus{border-color:#c8a05080}
  textarea.form-input{resize:vertical;min-height:90px}
  .form-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
  .form-title{font-size:14px;font-weight:700;color:var(--gold2);margin-bottom:14px;direction:rtl}
  .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:var(--card);border:1px solid #c8a05040;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;text-align:center}
  .login-icon{font-size:44px;margin-bottom:16px;filter:drop-shadow(0 0 12px #c8a05060)}
  .login-title{font-size:18px;font-weight:700;color:var(--gold2);margin-bottom:4px}
  .login-sub{font-size:12px;color:var(--muted);margin-bottom:24px;font-family:'JetBrains Mono',monospace}
  .login-input{width:100%;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;outline:none;text-align:center;margin-bottom:10px;transition:border-color .2s}
  .login-input:focus{border-color:#c8a05080}
  .login-err{color:var(--danger);font-size:12px;margin-bottom:10px}
  .login-btn{width:100%;padding:12px;background:var(--gold);border:none;border-radius:10px;color:#000;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;transition:background .2s}
  .login-btn:hover{background:var(--gold2)}
  .notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;animation:fadeIn .3s ease;font-family:'Cairo',sans-serif}
  .stats{display:flex;gap:12px;padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border2);flex-shrink:0;direction:rtl}
  .stat{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .stat b{color:var(--gold);font-family:'JetBrains Mono',monospace}
  .empty{text-align:center;padding:40px 20px;color:var(--muted)}
  .empty-icon{font-size:36px;margin-bottom:8px;opacity:.4}
  @media(max-width:600px){.header-title{font-size:12px}.bubble{max-width:90%;font-size:13px}.admin-wrap{padding:12px}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ══════════════════════════════════════════
//   مركز معرفة الإنقاذ البحري الجوي
//   Naval Aviation Rescue Swimming KB
//   Version 1.0
// ══════════════════════════════════════════

// ⚠️ غيّر كلمة المرور هنا قبل النشر
const ADMIN_PW = "rescue@2024";

// مفتاح Gemini API
const GEMINI_KEY = "AIzaSyCNcv5P2qsfXiBSG4mXveBdudOR94VqrW8";

// ══════════ البيانات التجريبية ══════════
const DEMO_KNOWLEDGE = [
  {id:1,category:"إجراءات الإنقاذ",title:"تسلسل الإنقاذ البحري الجوي",
   content:`Naval Aviation Rescue Swimming Sequence (NARS):
1. Situation Assessment — Evaluate hazards: currents, debris, sea state, survivor condition
2. Communication — Confirm with aircrew: Ready signal, establish abort criteria
3. Entry — Giant stride, feet-first, or head-first based on conditions
4. Approach — Defensive swimming; avoid direct front approach to panicking survivor
5. Stabilization — Apply rescue collar, assess ABC (Airway, Breathing, Circulation)
6. Extraction — Signal aircrew, maintain position during hoist

بالعربية: تقييم الموقف ← التواصل مع الطيار ← الدخول الصحيح ← الاقتراب الدفاعي ← تثبيت المنكوب ← الإخلاء`,
   tags:"rescue,إنقاذ,procedure,تسلسل,NARS,sequence"},
  {id:2,category:"المعدات",title:"معدات سباح الإنقاذ الأساسية",
   content:`Primary Rescue Swimmer Equipment:
• Wetsuit/Drysuit (بدلة الغوص) — Thermal protection
• Mask + Fins (قناع وزعانف) — Full-face or half mask
• Rescue Collar (طوق الإنقاذ) — Inflatable for survivor stabilization
• Harness & Cable (حزام وحبل الرفع) — Rated for hoist operations
• Communication Device (جهاز اتصال) — Waterproof, helmet-mounted
• Strobe Light (ضوء وميضي) — Activated before water entry
• Knife (سكين) — Quick-release, stainless, lower leg mount`,
   tags:"equipment,معدات,wetsuit,harness,collar,gear,تجهيزات"},
  {id:3,category:"الطب التطبيقي",title:"الإنعاش القلبي الرئوي — الغريق",
   content:`CPR for Drowning Victims:
• CPR CANNOT be performed in water — extract first
• After Extraction: Open airway → Check breathing → Begin CPR 30:2
• Rate: 100–120 compressions/minute, Depth: 5–6 cm
• Near-Drowning: Treat as cardiac arrest even with pulse
• Hypothermia: "Not dead until warm and dead" — continue CPR until 32°C core temp

بالعربية: لا تبدأ في الماء — أخرج أولاً — 30 ضغطة : 2 نفس — 100-120/دقيقة`,
   tags:"CPR,إنعاش,drowning,غرق,first aid,إسعاف,cardiac"},
  {id:4,category:"الإشارات",title:"إشارات يد سباح الإنقاذ مع الطائرة",
   content:`Hand Signals — Swimmer to Aircrew:
• 👍 Thumbs Up = OK / Ready / Hoist me
• 👎 Thumbs Down = Problem / Hold / Do not proceed
• 🙌 Hands on Head = Urgent assistance needed
• One Arm Wave = Move in that direction
• ✖️ Arms Crossed = ABORT all operations
• Horizontal Arm Rotation = Hoist up faster
• Vertical Arm Rotation = Hoist down slower`,
   tags:"signals,إشارات,hand signals,aircraft,hoist,رفع,communication"},
  {id:5,category:"السلامة",title:"قائمة الفحص قبل الإنزال",
   content:`Pre-Deployment Checklist:
✓ Equipment check: All gear secured, knife accessible, comm tested
✓ Survivor assessment: Number, visible condition from aircraft
✓ Hazard evaluation: Shark indicators, current, sea state (Beaufort)
✓ Abort criteria: Established with aircrew
✓ Entry method: Selected based on conditions
Minimum GO: Sea State ≤ 4, Visibility > 500m, No confirmed predator activity`,
   tags:"safety,سلامة,checklist,قائمة فحص,pre-deployment"},
  {id:6,category:"النظرية",title:"تصنيف حالات الغرق",
   content:`Drowning Classification:
1. Active (نشط): Conscious, struggling — SHORT window (20-60 sec)
2. Passive (سلبي): Unconscious, face-down — medical emergency
3. Near-Drowning (قارب الغرق): Survived, monitor for Secondary Drowning
4. Dry Drowning (جاف): Laryngospasm without aspiration — 15% of cases
5. Secondary: Delayed pulmonary edema 1-24h after rescue

Submersion vs Survival: <5min High | 5-10min Moderate | >25min Rare (unless hypothermia)`,
   tags:"drowning,غرق,classification,تصنيف,near-drowning,theory,نظرية"}
];

// ══════════ الحالة ══════════
let S = {
  view:"chat",adminAuth:false,
  knowledge:JSON.parse(localStorage.getItem("kb_data")||"null")||DEMO_KNOWLEDGE,
  messages:[],input:"",loading:false,
  pwInput:"",pwError:"",filterCat:"الكل",
  showAddForm:false,editEntry:null,
  formData:{category:"",title:"",content:"",tags:""},
  notification:"",notifTimer:null
};

function saveKB(){ localStorage.setItem("kb_data",JSON.stringify(S.knowledge)); }

// ══════════ Gemini API ══════════
async function callGemini(q){
  const ctx = S.knowledge.map(k=>
    `[${k.category}]\nالعنوان: ${k.title}\nالمحتوى: ${k.content}\nالكلمات: ${k.tags}`
  ).join("\n\n═══\n\n");
  const sys=`أنت مساعد تعليمي متخصص حصرياً في مجال الإنقاذ البحري الجوي (Naval Aviation Rescue Swimming).
القواعد الصارمة:
١. أجب فقط على ما يتعلق بالإنقاذ البحري الجوي.
٢. إذا كان السؤال خارج هذا المجال قل: "هذا السؤال خارج نطاق تخصصي."
٣. لا تكشف هوية أي شخص أو معلومات خاصة.
٤. لا تذكر أنك Gemini أو AI — أنت مساعد مركز المعرفة فقط.
٥. أجب بلغة المستخدم (عربي أو إنجليزي) تلقائياً.
٦. إذا لم تجد الجواب في قاعدة المعرفة، قل ذلك بوضوح.
٧. كن دقيقاً ومنظماً ومختصراً.
قاعدة المعرفة:
${ctx}`;
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:[{role:"user",parts:[{text:q}]}],
       generationConfig:{temperature:0.1,maxOutputTokens:1200}})});
  const d=await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"لم أتمكن من الإجابة.";
}

// ══════════ الإجراءات ══════════
function notif(m){
  if(S.notifTimer)clearTimeout(S.notifTimer);
  S.notification=m;render();
  S.notifTimer=setTimeout(()=>{S.notification="";render();},2800);
}
async function send(){
  const q=S.input.trim();if(!q||S.loading)return;
  S.input="";S.messages.push({role:"user",content:q});S.loading=true;render();scrollEnd();
  try{const a=await callGemini(q);S.messages.push({role:"bot",content:a});}
  catch(e){S.messages.push({role:"bot",content:"⚠️ خطأ في الاتصال. تحقق من الإنترنت.\nConnection error. Check your internet."});}
  S.loading=false;render();scrollEnd();
}
function scrollEnd(){setTimeout(()=>document.getElementById("msg-end")?.scrollIntoView({behavior:"smooth"}),50);}
function login(){
  if(S.pwInput===ADMIN_PW){S.adminAuth=true;S.pwError="";S.view="admin";render();}
  else{S.pwError="كلمة المرور غير صحيحة / Incorrect password";render();}
}
function logout(){S.adminAuth=false;S.view="chat";S.pwInput="";render();}
function addEntry(){
  if(!S.formData.title||!S.formData.content)return;
  S.knowledge.unshift({...S.formData,id:Date.now()});
  S.formData={category:"",title:"",content:"",tags:""};
  S.showAddForm=false;saveKB();notif("✅ تمت الإضافة بنجاح");
}
function delEntry(id){
  if(!confirm("هل أنت متأكد من الحذف؟"))return;
  S.knowledge=S.knowledge.filter(k=>k.id!==id);saveKB();notif("🗑️ تم الحذف");
}
function saveEdit2(){
  const i=S.knowledge.findIndex(k=>k.id===S.editEntry.id);
  if(i!==-1)S.knowledge[i]={...S.editEntry};
  S.editEntry=null;saveKB();notif("✅ تم الحفظ بنجاح");
}
function exportJSON(){
  const b=new Blob([JSON.stringify(S.knowledge,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);
  a.download="rescue_knowledge.json";a.click();notif("📥 تم التصدير");
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{S.knowledge=JSON.parse(ev.target.result);saveKB();notif("📤 تم الاستيراد بنجاح");}
  catch{notif("❌ ملف غير صالح");}};r.readAsText(f);
}
function cats(){return["الكل",...new Set(S.knowledge.map(k=>k.category))];}
function filtered(){return S.filterCat==="الكل"?S.knowledge:S.knowledge.filter(k=>k.category===S.filterCat);}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function rfv(id){return document.getElementById(id)?.value||"";}

// ══════════ بناء HTML ══════════
function render(){
  document.getElementById("root").innerHTML=html();
  events();
}
function html(){
  return`${S.notification?`<div class="notif">${S.notification}</div>`:""}
  <div class="header">
    <div class="header-logo">
      <div class="anchor">⚓</div>
      <div>
        <div class="header-title">مركز معرفة الإنقاذ البحري الجوي</div>
        <div class="header-sub">NAVAL AVIATION RESCUE SWIMMING · KB v1.0</div>
      </div>
    </div>
    <div class="nav">
      <div class="status-dot"></div>
      ${S.view==="chat"?`<button class="nav-btn active">💬 المحادثة</button><button class="nav-btn" id="bn-adm">🔐 الإدارة</button>`:
        S.view==="login"?`<button class="nav-btn" id="bn-back">← رجوع</button>`:
        `<button class="nav-btn" id="bn-exp">📤 تصدير</button><label class="nav-btn" style="cursor:pointer">📥 استيراد<input type="file" accept=".json" id="imp-file" style="display:none"></label><button class="nav-btn" id="bn-out">خروج</button>`}
    </div>
  </div>
  <div class="main">${S.view==="chat"?chatHTML():S.view==="login"?loginHTML():adminHTML()}</div>`;
}

function chatHTML(){
  const msgs=S.messages.map(m=>`<div class="msg-row ${m.role}">
    <div class="avatar ${m.role==="user"?"user":"bot"}">${m.role==="user"?"👤":"⚓"}</div>
    <div class="bubble ${m.role==="user"?"user":"bot"}">${esc(m.content)}</div>
  </div>`).join("");
  const typing=S.loading?`<div class="msg-row bot"><div class="avatar bot">⚓</div>
    <div class="bubble bot typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`:"";
  const welcome=S.messages.length===0?`<div style="text-align:center;padding:30px 16px;direction:rtl">
    <div style="font-size:48px;margin-bottom:12px;filter:drop-shadow(0 0 16px #c8a05060)">⚓</div>
    <div style="font-size:16px;font-weight:700;color:#c8a050;margin-bottom:8px">مركز معرفة الإنقاذ البحري الجوي</div>
    <div style="font-size:13px;color:#5a7a9a;line-height:1.7;max-width:380px;margin:0 auto">
      اسألني عن أي إجراء إنقاذ، معدة، بروتوكول طبي، أو مهارة.<br>
      <span style="font-size:11px;font-family:monospace;color:#3a5a7a">Ask about rescue procedures, equipment, or protocols.</span>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:18px">
      ${["ما هو تسلسل الإنقاذ؟","معدات سباح الإنقاذ","كيف أجري CPR للغريق؟","إشارات اليد مع الطائرة"].map(q=>`<button class="nav-btn qq" data-q="${q}">${q}</button>`).join("")}
    </div></div>`:"";
  return`<div class="chat-wrap">
    <div class="stats"><div class="stat">📚 قاعدة المعرفة: <b>${S.knowledge.length}</b> عنصر</div><div class="stat">💬 الرسائل: <b>${S.messages.length}</b></div></div>
    <div class="messages" id="msg-box">${welcome}${msgs}${typing}<div id="msg-end"></div></div>
    <div class="input-area">
      <textarea class="chat-input" id="ci" placeholder="اكتب سؤالك هنا... / Type your question here..." rows="1" dir="auto" ${S.loading?"disabled":""}>${esc(S.input)}</textarea>
      <button class="send-btn" id="sb" ${S.loading||!S.input.trim()?"disabled":""}>✈</button>
    </div></div>`;
}

function loginHTML(){return`<div class="login-wrap"><div class="login-card">
  <div class="login-icon">🔐</div>
  <div class="login-title">لوحة التحكم</div>
  <div class="login-sub">INSTRUCTOR CONTROL PANEL</div>
  <input class="login-input" id="pi" type="password" placeholder="كلمة المرور / Password" value="${esc(S.pwInput)}" dir="auto">
  ${S.pwError?`<div class="login-err">${S.pwError}</div>`:""}
  <button class="login-btn" id="lb">دخول / Login</button>
  <div style="margin-top:16px;font-size:11px;color:#3a5a7a;font-family:monospace">للمدربين فقط · Instructors Only</div>
</div></div>`;}

function adminHTML(){
  const list=filtered().map(k=>`<div class="card">
    <div class="card-header">
      <div style="flex:1">
        <span class="card-badge">${esc(k.category||"غير مصنف")}</span>
        <div class="card-title">${esc(k.title)}</div>
        <div class="card-content">${esc(k.content.length>120?k.content.substring(0,120)+"...":k.content)}</div>
        ${k.tags?`<div class="card-tags">${k.tags.split(",").map(t=>`<span class="tag">${esc(t.trim())}</span>`).join("")}</div>`:""}
      </div>
      <div class="card-actions">
        <button class="btn btn-outline btn-sm eb" data-id="${k.id}">✏️</button>
        <button class="btn btn-danger btn-sm db" data-id="${k.id}">🗑️</button>
      </div>
    </div></div>`).join("");
  const af=S.showAddForm?formHTML(S.formData,false):"";
  const ef=S.editEntry?formHTML(S.editEntry,true):"";
  return`<div class="admin-wrap">
    <div class="admin-top">
      <div><div class="admin-title">إدارة قاعدة المعرفة</div>
        <div class="admin-count">KNOWLEDGE BASE · ${S.knowledge.length} ENTRIES</div></div>
      <div class="action-row"><button class="btn btn-gold" id="ab">+ إضافة</button></div>
    </div>
    <div class="cats">${cats().map(c=>`<button class="cat-btn ${S.filterCat===c?"active":""} cf" data-cat="${c}">${c}</button>`).join("")}</div>
    ${af}${ef}${list||`<div class="empty"><div class="empty-icon">📭</div>لا توجد عناصر</div>`}
  </div>`;}

function formHTML(d,isEdit){return`<div class="card form-card">
  <div class="form-title">${isEdit?"✏️ تعديل العنصر":"➕ إضافة عنصر جديد"}</div>
  <div class="form-group"><label class="form-label">التصنيف / Category</label>
    <input class="form-input" id="fc" value="${esc(d.category||"")}" placeholder="مثال: إجراءات الإنقاذ"></div>
  <div class="form-group"><label class="form-label">العنوان / Title *</label>
    <input class="form-input" id="ft" value="${esc(d.title||"")}" placeholder="عنوان واضح ومحدد"></div>
  <div class="form-group"><label class="form-label">المحتوى / Content *</label>
    <textarea class="form-input" id="fco" rows="5" placeholder="المحتوى بالعربية والإنجليزي">${esc(d.content||"")}</textarea></div>
  <div class="form-group"><label class="form-label">الكلمات المفتاحية / Tags</label>
    <input class="form-input" id="ftg" value="${esc(d.tags||"")}" placeholder="rescue, إنقاذ, procedure"></div>
  <div class="form-row">
    <button class="btn btn-outline" id="cf-cancel">إلغاء</button>
    <button class="btn btn-gold" id="${isEdit?"se-btn":"sa-btn"}">${isEdit?"💾 حفظ التعديل":"✅ إضافة"}</button>
  </div></div>`;}

// ══════════ الأحداث ══════════
function events(){
  const g=id=>document.getElementById(id);
  // Nav
  g("bn-adm")?.addEventListener("click",()=>{S.view="login";S.pwInput="";S.pwError="";render();});
  g("bn-back")?.addEventListener("click",()=>{S.view="chat";render();});
  g("bn-exp")?.addEventListener("click",exportJSON);
  g("bn-out")?.addEventListener("click",logout);
  g("imp-file")?.addEventListener("change",importJSON);
  // Login
  const pi=g("pi");
  if(pi){pi.addEventListener("input",e=>S.pwInput=e.target.value);
    pi.addEventListener("keydown",e=>{if(e.key==="Enter")login();});setTimeout(()=>pi.focus(),50);}
  g("lb")?.addEventListener("click",login);
  // Chat
  const ci=g("ci");
  if(ci){
    ci.addEventListener("input",e=>{
      S.input=e.target.value;
      const sb=g("sb");if(sb)sb.disabled=S.loading||!S.input.trim();
      ci.style.height="auto";ci.style.height=Math.min(ci.scrollHeight,120)+"px";
    });
    ci.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
    if(!S.loading)setTimeout(()=>ci.focus(),50);
  }
  g("sb")?.addEventListener("click",send);
  document.querySelectorAll(".qq").forEach(b=>b.addEventListener("click",()=>{S.input=b.dataset.q;render();setTimeout(send,50);}));
  // Admin
  g("ab")?.addEventListener("click",()=>{S.showAddForm=!S.showAddForm;S.editEntry=null;S.formData={category:"",title:"",content:"",tags:""};render();});
  g("cf-cancel")?.addEventListener("click",()=>{S.showAddForm=false;S.editEntry=null;render();});
  g("sa-btn")?.addEventListener("click",()=>{S.formData={category:rfv("fc"),title:rfv("ft"),content:rfv("fco"),tags:rfv("ftg")};addEntry();});
  g("se-btn")?.addEventListener("click",()=>{S.editEntry={...S.editEntry,category:rfv("fc"),title:rfv("ft"),content:rfv("fco"),tags:rfv("ftg")};saveEdit2();});
  document.querySelectorAll(".eb").forEach(b=>b.addEventListener("click",()=>{
    S.editEntry={...S.knowledge.find(k=>k.id===Number(b.dataset.id))};S.showAddForm=false;render();
    setTimeout(()=>g("ft")?.scrollIntoView({behavior:"smooth"}),50);
  }));
  document.querySelectorAll(".db").forEach(b=>b.addEventListener("click",()=>delEntry(Number(b.dataset.id))));
  document.querySelectorAll(".cf").forEach(b=>b.addEventListener("click",()=>{S.filterCat=b.dataset.cat;render();}));
}

window.onload=render;
</script>
</body>
</html>
