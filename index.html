<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز معرفة الإنقاذ البحري الجوي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#040d1a;--surface:#07142a;--card:#0a1c38;--border:#1a3056;--border2:#0f2040;
  --gold:#c8a050;--gold2:#e8c070;--text:#c8d8ee;--muted:#5a7a9a;
  --user:#112a52;--bot:#060f20;--danger:#c05858;--success:#3a9060;--input:#060f20;
  --scan:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(10,40,80,.15) 2px,rgba(10,40,80,.15) 4px);
}
html,body{height:100%;background:var(--bg);font-family:'Cairo',sans-serif;color:var(--text);overflow:hidden}
#root{height:100%;display:flex;flex-direction:column;max-width:1100px;margin:0 auto}

/* HEADER */
.header{background:linear-gradient(135deg,#040d1a,#071428 60%,#0a1c38);border-bottom:1px solid var(--gold);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;overflow:hidden;z-index:10}
.header::after{content:'';position:absolute;inset:0;background:var(--scan);pointer-events:none;opacity:.5}
.hlogo{display:flex;align-items:center;gap:12px}
.anchor{width:40px;height:40px;background:radial-gradient(#c8a05040,#c8a05010);border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 16px #c8a05030;flex-shrink:0}
.htitle{font-size:13px;font-weight:700;color:var(--gold2);line-height:1.3}
.hsub{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.nav{display:flex;gap:6px;align-items:center}
.nb{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Cairo',sans-serif;transition:all .2s;white-space:nowrap}
.nb:hover,.nb.act{border-color:var(--gold);color:var(--gold);background:#c8a05015}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px #3a9060;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0}
.sbar{display:flex;gap:16px;padding:8px 18px;background:var(--surface);border-bottom:1px solid var(--border2);flex-shrink:0;direction:rtl;flex-wrap:wrap}
.si{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.si b{color:var(--gold);font-family:'JetBrains Mono',monospace}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;min-height:0}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mr{display:flex;gap:10px;align-items:flex-start;animation:fi .3s ease}
.mr.user{flex-direction:row-reverse}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border)}
.av.bot{background:radial-gradient(#c8a05020,#c8a05005);border-color:#c8a05040}
.av.user{background:radial-gradient(#1a3a6a,#112050);border-color:#2a4a8a}
.bub{max-width:78%;padding:11px 15px;font-size:13.5px;line-height:1.8;white-space:pre-wrap;word-break:break-word;border-radius:4px 18px 18px 18px;border:1px solid var(--border2);background:var(--bot);position:relative}
.bub.user{border-radius:18px 4px 18px 18px;background:var(--user);border-color:#1e3a6a;text-align:right}
.bub.bot::before{content:'';position:absolute;right:-1px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),transparent);border-radius:1px}
.typing{display:flex;align-items:center;gap:6px;padding:12px 18px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:db 1.4s infinite ease-in-out}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}
.iarea{padding:12px 16px;background:linear-gradient(0deg,var(--surface),var(--surface) 90%,transparent);border-top:1px solid var(--border2);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
.ci{flex:1;background:var(--input);border:1px solid var(--border);border-radius:12px;padding:11px 15px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;outline:none;resize:none;min-height:44px;max-height:120px;line-height:1.5;transition:border-color .2s}
.ci:focus{border-color:#c8a05080}
.ci::placeholder{color:var(--muted)}
.sbtn{width:44px;height:44px;flex-shrink:0;background:linear-gradient(135deg,var(--gold),#a07830);border:none;border-radius:12px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#fff}
.sbtn:hover:not(:disabled){transform:scale(1.06)}
.sbtn:disabled{opacity:.4;cursor:not-allowed}
.welcome{text-align:center;padding:28px 16px;direction:rtl}
.wicon{font-size:44px;margin-bottom:10px;filter:drop-shadow(0 0 16px #c8a05060)}
.wtitle{font-size:15px;font-weight:700;color:#c8a050;margin-bottom:8px}
.wsub{font-size:13px;color:#5a7a9a;line-height:1.7;max-width:380px;margin:0 auto 16px}
.wqs{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}

/* FILES — instructor only */
.files-wrap{display:flex;height:100%;overflow:hidden;min-height:0}
/* SIDEBAR FOLDERS */
.fsidebar{width:200px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.fsidebar-top{padding:14px 12px 10px;border-bottom:1px solid var(--border2);flex-shrink:0}
.fsidebar-title{font-size:12px;font-weight:700;color:var(--gold2);margin-bottom:10px;direction:rtl}
.folder-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;direction:rtl;gap:6px}
.folder-item:hover{background:#c8a05010}
.folder-item.act{background:#c8a05018;border:1px solid #c8a05040}
.folder-item.act .fn{color:var(--gold)}
.fn{font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fcount{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.folder-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.folder-item:hover .folder-actions{opacity:1}
.icon-btn{width:20px;height:20px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;border-radius:3px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{background:var(--border);color:var(--text)}
.folders-list{flex:1;overflow-y:auto;padding:8px}
.folders-list::-webkit-scrollbar{width:3px}
.folders-list::-webkit-scrollbar-thumb{background:var(--border)}
/* MAIN FILE AREA */
.fmain{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.fmain-top{padding:12px 16px;border-bottom:1px solid var(--border2);flex-shrink:0;direction:rtl;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.fmain-title{font-size:13px;font-weight:700;color:var(--gold2)}
.fmain-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
/* UPLOAD */
.upzone{border:2px dashed var(--border);border-radius:12px;padding:20px 14px;text-align:center;cursor:pointer;transition:all .25s;margin:12px 14px;flex-shrink:0;background:#07142a80;position:relative;overflow:hidden}
.upzone:hover,.upzone.drag{border-color:var(--gold);background:#c8a05008}
.upzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upzone-icon{font-size:28px;margin-bottom:6px}
.upzone-text{font-size:12px;color:var(--muted);line-height:1.6}
.upzone-text b{color:var(--gold2)}
/* PROGRESS */
.prog-wrap{padding:0 14px 6px;flex-shrink:0}
.prog-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .3s;width:0%}
.prog-label{font-size:11px;color:var(--muted);text-align:center;margin-top:4px;direction:rtl}
/* SELECTION BAR */
.selbar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:#c8a05012;border-bottom:1px solid #c8a05030;flex-shrink:0;direction:rtl;flex-wrap:wrap}
.selbar span{font-size:12px;color:var(--gold)}
/* FILE GRID */
.fgrid{flex:1;overflow-y:auto;padding:0 14px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;align-content:start;min-height:0}
.fgrid::-webkit-scrollbar{width:4px}
.fgrid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* FILE CARD */
.fcard{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;gap:7px;direction:rtl}
.fcard:hover{border-color:var(--border);transform:translateY(-1px)}
.fcard.selected{border-color:var(--gold);background:#c8a05010}
.fcard-check{position:absolute;top:8px;left:8px;width:18px;height:18px;border-radius:4px;border:2px solid var(--border);background:var(--input);display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s}
.fcard.selected .fcard-check{border-color:var(--gold);background:var(--gold);color:#000}
.fcard-icon{font-size:28px;text-align:center}
.fcard-name{font-size:11px;font-weight:600;color:var(--text);word-break:break-all;text-align:right;line-height:1.4}
.fcard-folder{display:inline-block;padding:1px 8px;border-radius:8px;background:#c8a05015;color:var(--gold);font-size:10px}
.fcard-meta{font-size:10px;color:var(--muted)}
.fcard-txt{font-size:10px;color:#5a9a7a;font-family:'JetBrains Mono',monospace}
.fcard-btns{display:flex;gap:4px;margin-top:2px}
.empty-state{grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:10px;opacity:.3}

/* ADMIN */
.admin-wrap{flex:1;overflow-y:auto;padding:18px;direction:rtl}
.admin-wrap::-webkit-scrollbar{width:4px}
.admin-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.atop{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.atitle{font-size:15px;font-weight:700;color:var(--gold2)}
.acard{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color .2s;direction:rtl}
.acard:hover{border-color:var(--border)}.acard.fc{border-color:#c8a05040;margin-bottom:16px}
.ach{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.abadge{display:inline-block;padding:2px 10px;border-radius:10px;background:#c8a05018;border:1px solid #c8a05030;color:var(--gold);font-size:11px;margin-bottom:6px}
.act-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px}
.act-content{font-size:12px;color:var(--muted);line-height:1.6}
.atags{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.tag{padding:2px 8px;border-radius:4px;background:var(--border2);color:var(--muted);font-size:11px}
.aactions{display:flex;gap:6px;flex-shrink:0}

/* FORMS */
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.fi{width:100%;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s;direction:rtl}
.fi:focus{border-color:#c8a05080}
textarea.fi{resize:vertical;min-height:90px}
.fr{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.form-title{font-size:14px;font-weight:700;color:var(--gold2);margin-bottom:14px}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'Cairo',sans-serif;transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.bg{background:var(--gold);color:#000}.bg:hover{background:var(--gold2)}
.bo{background:transparent;border:1px solid var(--border);color:var(--muted)}.bo:hover{border-color:var(--gold);color:var(--gold)}
.bd{background:#c0585820;border:1px solid #c0585850;color:var(--danger)}.bd:hover{background:var(--danger);color:#fff}
.bsm{padding:4px 9px;font-size:11px}

/* LOGIN */
.lw{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.lc{background:var(--card);border:1px solid #c8a05040;border-radius:16px;padding:36px 32px;width:100%;max-width:360px;text-align:center}
.li2{font-size:40px;margin-bottom:14px;filter:drop-shadow(0 0 12px #c8a05060)}
.lt{font-size:17px;font-weight:700;color:var(--gold2);margin-bottom:4px}
.ls{font-size:11px;color:var(--muted);margin-bottom:22px;font-family:'JetBrains Mono',monospace}
.lin{width:100%;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;outline:none;text-align:center;margin-bottom:10px;transition:border-color .2s}
.lin:focus{border-color:#c8a05080}
.lerr{color:var(--danger);font-size:12px;margin-bottom:10px}
.lbtn{width:100%;padding:12px;background:var(--gold);border:none;border-radius:10px;color:#000;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer}
.lbtn:hover{background:var(--gold2)}

/* MODAL */
.overlay{position:fixed;inset:0;background:#00000090;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid #c8a05040;border-radius:14px;padding:24px;width:100%;max-width:400px;direction:rtl}
.modal-title{font-size:14px;font-weight:700;color:var(--gold2);margin-bottom:16px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* NOTIF */
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;animation:fi .3s ease;font-family:'Cairo',sans-serif;white-space:nowrap;box-shadow:0 4px 20px #00000050}
.spin{width:14px;height:14px;border:2px solid #c8a05040;border-top-color:var(--gold);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .fsidebar{width:150px}.htitle{font-size:11px}
  .nb{padding:5px 8px;font-size:11px}
  .fgrid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  .bub{max-width:88%;font-size:13px}
}
@media(max-width:480px){
  .fsidebar{display:none}
}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════
//   مركز معرفة الإنقاذ البحري الجوي — v3.0
//   Naval Aviation Rescue Swimming Knowledge Base
//   Access: Chat = everyone | Files/Admin = instructor only
// ═══════════════════════════════════════════════════════

const CFG = {
  SB_URL:   "https://swsrivfhyqurwxnqisso.supabase.co",
  SB_KEY:   "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3c3JpdmZoeXF1cnd4bnFpc3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTQxNjQsImV4cCI6MjA5MzI5MDE2NH0.9L1yjhX-S7gZOFuEWckVh89wHKFOexwcq0S7TY_gFwI",
  CLAUDE_KEY: "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",
  ADMIN_PW: "rescue@2024",   // ← غيّر هذا
  BUCKET:   "files",
};

// ── Supabase (lazy-loaded) ─────────────────────────────
let sb = null;
function getSB(){
  if(sb) return sb;
  try {
    sb = window.supabase?.createClient(CFG.SB_URL, CFG.SB_KEY);
    if(!sb) throw new Error("Supabase not loaded");
  } catch(e){ console.error("Supabase init failed:", e); }
  return sb;
}

// ── PDF.js ─────────────────────────────────────────────
function initPDF(){
  if(window.pdfjsLib){
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  }
}

// ── STATE ──────────────────────────────────────────────
let S = {
  view: "chat",
  auth: false,
  msgs: [], inp: "", chatLoading: false,
  files: [], filesLoading: false,
  folders: [],
  activeFolder: "الكل",
  selected: new Set(),
  uploading: false, uploadPct: 0, uploadLabel: "",
  drag: false,
  knowledge: JSON.parse(localStorage.getItem("kb_v3") || "null") || [],
  showAddForm: false, editEntry: null,
  formData: {category:"",title:"",content:"",tags:""},
  pw: "", pwErr: "",
  modal: null,   // { type: "folder-add" | "folder-edit" | "folder-delete" | "move", data:{} }
  notif: "", notifTimer: null,
};

function saveKB(){ localStorage.setItem("kb_v3", JSON.stringify(S.knowledge)); }

// ── GROQ AI (completely independent from Supabase) ─────
async function callGemini(question){
  const kbCtx = S.knowledge.map(k =>
    `[${k.category||"عام"}] ${k.title}\n${k.content}`
  ).join("\n\n---\n\n");

  const fileCtx = S.files
    .filter(f => f.extracted_text && f.extracted_text.length > 20)
    .map(f => `[ملف: ${f.original_name} — مجلد: ${f.category||"عام"}]\n${f.extracted_text.substring(0,2500)}`)
    .join("\n\n---\n\n");

  const ctx = [kbCtx, fileCtx].filter(Boolean).join("\n\n══════════\n\n");

  const sys = `أنت مساعد تعليمي متخصص حصرياً في مجال الإنقاذ البحري الجوي (Naval Aviation Rescue Swimming).
القواعد الصارمة:
١. أجب فقط عن الإنقاذ البحري الجوي. إذا كان السؤال خارجاً عن هذا المجال قل بالضبط: "هذا السؤال خارج نطاق تخصصي."
٢. لا تكشف هوية أحد أو أي معلومات خاصة.
٣. لا تذكر أنك AI أو نموذج لغوي — أنت مساعد مركز المعرفة فقط.
٤. أجب بلغة المستخدم تلقائياً (عربي أو إنجليزي).
٥. إذا لم تجد الجواب في المصادر قل ذلك بوضوح.
٦. كن دقيقاً ومنظماً. استخدم الأرقام والنقاط عند الحاجة.
٧. عند الإجابة من ملف، اذكر اسم الملف المصدر بين قوسين.
${ctx ? "\n\nقاعدة المعرفة والملفات:\n" + ctx : "\n\nقاعدة المعرفة فارغة حالياً."}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": CFG.CLAUDE_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1500,
      system: sys,
      messages: [{role: "user", content: question}]
    })
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  const d = await res.json();
  return d.content?.[0]?.text || "لم أتمكن من الإجابة.";
}

// ── PDF TEXT EXTRACTION ────────────────────────────────
async function extractPDF(file){
  if(!window.pdfjsLib) return "";
  try {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data:buf}).promise;
    let text = "";
    const maxPages = Math.min(pdf.numPages, 60);
    for(let i=1; i<=maxPages; i++){
      const pg  = await pdf.getPage(i);
      const ct  = await pg.getTextContent();
      text += ct.items.map(it=>it.str).join(" ") + "\n";
    }
    return text.trim().substring(0, 20000);
  } catch(e){ return ""; }
}

// ── FILE HELPERS ───────────────────────────────────────
function fileIcon(type){
  if(!type) return "📄";
  if(type.includes("pdf"))  return "📕";
  if(type.includes("image")) return "🖼️";
  if(type.includes("presentation")||type.includes("powerpoint")) return "📊";
  if(type.includes("word")||type.includes("document")) return "📝";
  if(type.includes("sheet")||type.includes("excel")) return "📗";
  if(type.includes("video")) return "🎬";
  return "📄";
}
function fmtSize(b){
  if(!b) return "";
  if(b<1024) return b+"B";
  if(b<1048576) return (b/1024).toFixed(1)+"KB";
  return (b/1048576).toFixed(1)+"MB";
}
function fmtDate(d){
  if(!d) return "";
  return new Date(d).toLocaleDateString("ar-SA",{month:"short",day:"numeric"});
}

// ── LOAD DATA ──────────────────────────────────────────
async function loadFolders(){
  const db = getSB(); if(!db) return;
  const {data} = await db.from("folders").select("*").order("created_at");
  S.folders = data || [];
}

async function loadFiles(){
  S.filesLoading = true; render();
  const db = getSB();
  if(!db){ S.filesLoading=false; render(); return; }
  try {
    const {data,error} = await db.from("file_metadata").select("*").order("created_at",{ascending:false});
    if(error) throw error;
    S.files = data || [];
  } catch(e){ notif("❌ "+e.message); }
  S.filesLoading = false; render();
}

async function loadAll(){
  await Promise.all([loadFolders(), loadFiles()]);
}

// ── UPLOAD ────────────────────────────────────────────
async function uploadFiles(fileList){
  if(!fileList?.length) return;
  const db = getSB(); if(!db){ notif("❌ خطأ في الاتصال"); return; }
  initPDF();
  S.uploading=true; S.selected.clear(); render();
  let done=0;
  for(const file of Array.from(fileList)){
    S.uploadLabel=`جارٍ رفع: ${file.name}`; S.uploadPct=Math.round((done/fileList.length)*100); render();
    try {
      let extracted="";
      if(file.type.includes("pdf")){
        S.uploadLabel=`استخراج النص: ${file.name}`; render();
        extracted = await extractPDF(file);
      }
      const ext   = file.name.split(".").pop()||"bin";
      const path  = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {error:upErr} = await db.storage.from(CFG.BUCKET).upload(path, file, {upsert:true});
      if(upErr) throw upErr;
      const {data:urlData} = db.storage.from(CFG.BUCKET).getPublicUrl(path);
      const {error:dbErr} = await db.from("file_metadata").insert({
        name: path, original_name: file.name,
        category: S.activeFolder==="الكل" ? "عام" : S.activeFolder,
        file_type: file.type||ext, file_size: file.size,
        storage_path: path, public_url: urlData.publicUrl,
        extracted_text: extracted, tags: ""
      });
      if(dbErr) throw dbErr;
      done++;
    } catch(e){ notif("❌ فشل: "+file.name); }
  }
  S.uploadPct=100; S.uploadLabel=`✅ تم رفع ${done} ملف`;
  render();
  await loadFiles();
  setTimeout(()=>{ S.uploading=false; S.uploadPct=0; S.uploadLabel=""; render(); },1500);
  if(done>0) notif(`✅ تم رفع ${done} ملف`);
}

// ── DELETE FILES ──────────────────────────────────────
async function deleteSelected(){
  if(!S.selected.size) return;
  if(!confirm(`حذف ${S.selected.size} ملف نهائياً؟`)) return;
  const db=getSB(); if(!db) return;
  let ok=0;
  for(const id of [...S.selected]){
    const f=S.files.find(x=>x.id===id); if(!f) continue;
    try { await db.storage.from(CFG.BUCKET).remove([f.storage_path]); await db.from("file_metadata").delete().eq("id",id); ok++; }
    catch(e){}
  }
  S.selected.clear(); notif(`🗑️ حُذف ${ok} ملف`); await loadFiles();
}

async function deleteFile(id){
  const f=S.files.find(x=>x.id===id);
  if(!f||!confirm("حذف هذا الملف نهائياً؟")) return;
  const db=getSB(); if(!db) return;
  try { await db.storage.from(CFG.BUCKET).remove([f.storage_path]); await db.from("file_metadata").delete().eq("id",id); S.files=S.files.filter(x=>x.id!==id); notif("🗑️ تم الحذف"); render(); }
  catch(e){ notif("❌ فشل الحذف"); }
}

// ── MOVE FILES ────────────────────────────────────────
async function moveFiles(targetFolder){
  if(!S.selected.size||!targetFolder) return;
  const db=getSB(); if(!db) return;
  for(const id of [...S.selected]){
    await db.from("file_metadata").update({category:targetFolder}).eq("id",id);
  }
  S.selected.clear(); S.modal=null;
  notif(`📂 تم النقل إلى "${targetFolder}"`); await loadFiles();
}

// ── FOLDER CRUD ───────────────────────────────────────
async function addFolder(name){
  if(!name.trim()) return;
  const db=getSB(); if(!db) return;
  const {error}=await db.from("folders").insert({name:name.trim()});
  if(error) return notif("❌ "+error.message);
  S.modal=null; notif(`📁 تم إنشاء مجلد "${name}"`);
  await loadFolders(); render();
}

async function renameFolder(oldName, newName){
  if(!newName.trim()||oldName===newName) return;
  const db=getSB(); if(!db) return;
  await db.from("folders").update({name:newName}).eq("name",oldName);
  await db.from("file_metadata").update({category:newName}).eq("category",oldName);
  if(S.activeFolder===oldName) S.activeFolder=newName;
  S.modal=null; notif(`✅ تمت إعادة التسمية`);
  await loadAll(); render();
}

async function deleteFolder(name){
  if(!confirm(`حذف مجلد "${name}"؟ ستنتقل ملفاته إلى "عام".`)) return;
  const db=getSB(); if(!db) return;
  await db.from("file_metadata").update({category:"عام"}).eq("category",name);
  await db.from("folders").delete().eq("name",name);
  if(S.activeFolder===name) S.activeFolder="الكل";
  S.modal=null; notif(`🗑️ حُذف المجلد`);
  await loadAll(); render();
}

  g("nv-files")?.addEventListener("click",()=>{ S.view="files"; loadAll(); });
  g("nv-admin")?.addEventListener("click",()=>{ S.view="admin"; render(); });
  g("nv-login")?.addEventListener("click",()=>{ S.view="login"; S.pw=""; S.pwErr=""; render(); });
  g("nv-out")?.addEventListener("click",()=>{ S.auth=false; S.view="chat"; render(); });

  // LOGIN
  const pi=g("pi");
  if(pi){
    pi.addEventListener("input",e=>S.pw=e.target.value);
    pi.addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
    setTimeout(()=>pi.focus(),60);
  }
  g("lbtn")?.addEventListener("click",doLogin);

  // CHAT
  const ci=g("ci");
  if(ci){
    ci.addEventListener("input",e=>{
      S.inp=e.target.value;
      const sb=g("sbtn"); if(sb) sb.disabled=S.chatLoading||!S.inp.trim();
      ci.style.height="auto"; ci.style.height=Math.min(ci.scrollHeight,120)+"px";
    });
    ci.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();} });
    if(!S.chatLoading) setTimeout(()=>ci.focus(),60);
  }
  g("sbtn")?.addEventListener("click",sendMsg);
  document.querySelectorAll(".qq").forEach(b=>b.addEventListener("click",()=>{ S.inp=b.dataset.q; render(); setTimeout(sendMsg,50); }));

  // FILES
  const fi=g("file-input");
  if(fi) fi.addEventListener("change",e=>uploadFiles(e.target.files));
  const uz=g("upzone");
  if(uz){
    uz.addEventListener("dragover",e=>{ e.preventDefault(); S.drag=true; render(); });
    uz.addEventListener("dragleave",()=>{ S.drag=false; render(); });
    uz.addEventListener("drop",e=>{ e.preventDefault(); S.drag=false; uploadFiles(e.dataTransfer.files); });
  }
  g("reload-btn")?.addEventListener("click",loadAll);
  g("sel-all-btn")?.addEventListener("click",selAll);
  g("del-sel-btn")?.addEventListener("click",deleteSelected);
  g("move-sel-btn")?.addEventListener("click",()=>{ S.modal={type:"move",data:{}}; render(); });

  document.querySelectorAll(".fcard-item").forEach(c=>c.addEventListener("click",()=>toggleSel(c.dataset.id)));
  document.querySelectorAll(".del-one").forEach(b=>b.addEventListener("click",()=>deleteFile(b.dataset.id)));

  // FOLDERS
  document.querySelectorAll(".fitem").forEach(b=>b.addEventListener("click",()=>{ S.activeFolder=b.dataset.folder; render(); }));
  g("add-folder-btn")?.addEventListener("click",()=>{ S.modal={type:"folder-add",data:{}}; render(); setTimeout(()=>g("folder-name-inp")?.focus(),60); });
  document.querySelectorAll(".rename-folder").forEach(b=>b.addEventListener("click",e=>{ e.stopPropagation(); S.modal={type:"folder-edit",data:{name:b.dataset.name}}; render(); setTimeout(()=>g("folder-name-inp")?.focus(),60); }));
  document.querySelectorAll(".del-folder").forEach(b=>b.addEventListener("click",e=>{ e.stopPropagation(); deleteFolder(b.dataset.name); }));

  // MODAL
  g("modal-cancel")?.addEventListener("click",()=>{ S.modal=null; render(); });
  g("ov")?.addEventListener("click",e=>{ if(e.target.id==="ov"){ S.modal=null; render(); } });
  g("modal-confirm")?.addEventListener("click",()=>{
    const m=S.modal; if(!m) return;
    if(m.type==="folder-add")  addFolder(gv("folder-name-inp"));
    if(m.type==="folder-edit") renameFolder(m.data.name, gv("folder-name-inp"));
    if(m.type==="move")        moveFiles(gv("move-folder-sel"));
  });
  g("folder-name-inp")?.addEventListener("keydown",e=>{ if(e.key==="Enter") g("modal-confirm")?.click(); });

  // ADMIN
  g("aa-btn")?.addEventListener("click",()=>{ S.showAddForm=!S.showAddForm; S.editEntry=null; S.formData={category:"",title:"",content:"",tags:""}; render(); });
  g("exp-btn")?.addEventListener("click",()=>{ const b=new Blob([JSON.stringify(S.knowledge,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="kb.json"; a.click(); notif("📥 تم التصدير"); });
  g("cf-cancel")?.addEventListener("click",()=>{ S.showAddForm=false; S.editEntry=null; render(); });
  g("sa-btn")?.addEventListener("click",()=>{ S.formData={category:gv("fc"),title:gv("ft"),content:gv("fco"),tags:gv("ftg")}; addEntry(); });
  g("se-btn")?.addEventListener("click",()=>{ S.editEntry={...S.editEntry,category:gv("fc"),title:gv("ft"),content:gv("fco"),tags:gv("ftg")}; saveEdit(); });
  document.querySelectorAll(".ae").forEach(b=>b.addEventListener("click",()=>{ S.editEntry={...S.knowledge.find(k=>k.id===Number(b.dataset.id))}; S.showAddForm=false; render(); setTimeout(()=>g("ft")?.scrollIntoView({behavior:"smooth"}),60); }));
  document.querySelectorAll(".ad").forEach(b=>b.addEventListener("click",()=>delEntry(Number(b.dataset.id))));
}

function doLogin(){
  if(S.pw===CFG.ADMIN_PW){ S.auth=true; S.pwErr=""; S.view="files"; loadAll(); }
  else { S.pwErr="كلمة المرور غير صحيحة / Wrong password"; render(); }
}

// ── INIT ──────────────────────────────────────────────
window.addEventListener("load",()=>{
  initPDF();
  // Load files for chat context (silently, no UI change)
  const db=getSB();
  if(db){
    db.from("file_metadata").select("id,original_name,category,extracted_text").order("created_at",{ascending:false})
      .then(({data})=>{ if(data) S.files=data; render(); })
      .catch(()=>{});
  }
  render();
});
</script>
